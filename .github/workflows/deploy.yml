name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Resolve build base path
        id: resolve-base
        run: |
          custom_domain="${{ vars.CUSTOM_DOMAIN }}"

          if [ -z "$custom_domain" ] && [ -f CNAME ]; then
            custom_domain="$(tr -d '\r\n' < CNAME)"
          fi

          if [ -n "$custom_domain" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

          echo "custom_domain=$custom_domain" >> "$GITHUB_OUTPUT"

      - name: Build site
        run: npm run build

      - name: Add custom domain
        if: ${{ steps.resolve-base.outputs.custom_domain != '' }}
        run: echo "${{ steps.resolve-base.outputs.custom_domain }}" > dist/CNAME

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
